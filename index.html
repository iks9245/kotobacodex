<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#09090b">
  <title>ことば - 滑動學日語</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --card: #151519;
      --card-strong: #1c1c22;
      --primary: #f97316;
      --primary-soft: rgba(249, 115, 22, 0.16);
      --success: #22c55e;
      --success-soft: rgba(34, 197, 94, 0.14);
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, 0.14);
      --warning: #facc15;
      --warning-soft: rgba(250, 204, 21, 0.14);
      --text: #f0ece4;
      --muted: #6b6975;
      --border: #2a2a34;
      --shadow: rgba(0, 0, 0, 0.36);
      --topbar: rgba(9, 9, 11, 0.82);
      --focus: rgba(249, 115, 22, 0.35);
      --radius: 8px;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      color-scheme: dark;
    }

    [data-theme="light"] {
      --bg: #faf9f7;
      --card: #ffffff;
      --card-strong: #f3f1ed;
      --primary: #ea580c;
      --primary-soft: rgba(234, 88, 12, 0.13);
      --success: #16a34a;
      --success-soft: rgba(22, 163, 74, 0.12);
      --danger: #dc2626;
      --danger-soft: rgba(220, 38, 38, 0.12);
      --warning: #ca8a04;
      --warning-soft: rgba(202, 138, 4, 0.12);
      --text: #24211d;
      --muted: #777168;
      --border: #e3ded7;
      --shadow: rgba(36, 33, 29, 0.12);
      --topbar: rgba(250, 249, 247, 0.86);
      --focus: rgba(234, 88, 12, 0.25);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% -18%, rgba(249, 115, 22, 0.12), transparent 34rem),
        linear-gradient(180deg, var(--bg) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Noto Sans TC", "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .app-shell {
      min-height: 100vh;
      min-height: 100dvh;
    }

    .topbar {
      position: fixed;
      z-index: 50;
      top: 0;
      left: 0;
      right: 0;
      height: calc(64px + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) 16px 0;
      background: var(--topbar);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(100%, 460px);
      height: 64px;
      margin: 0 auto;
    }

    .brand-button {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      min-height: 44px;
      padding: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .brand-main {
      font-family: "Noto Sans JP", sans-serif;
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      box-shadow: 0 10px 24px transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .icon-button:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--primary), var(--border) 58%);
      box-shadow: 0 12px 24px var(--shadow);
    }

    .app-main {
      width: min(100%, 460px);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(84px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    }

    .view {
      animation: viewIn 0.28s var(--ease-out) both;
    }

    @keyframes viewIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .home-hero {
      display: grid;
      gap: 18px;
      padding: 10px 0 22px;
    }

    .today-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .home-title {
      margin: 0;
      font-family: "Noto Sans JP", "Noto Sans TC", sans-serif;
      font-size: 44px;
      font-weight: 900;
      line-height: 0.95;
    }

    .home-title span {
      display: block;
      margin-top: 8px;
      color: var(--primary);
      font-family: "Noto Sans TC", sans-serif;
      font-size: 22px;
      line-height: 1.2;
    }

    .primary-action,
    .secondary-action,
    .danger-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 18px;
      border-radius: var(--radius);
      font-weight: 900;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .primary-action {
      background: var(--primary);
      color: #111;
      box-shadow: 0 14px 30px rgba(249, 115, 22, 0.22);
    }

    .secondary-action {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
    }

    .danger-action {
      border: 1px solid color-mix(in srgb, var(--danger), var(--border) 45%);
      background: rgba(239, 68, 68, 0.12);
      color: var(--danger);
    }

    .primary-action:hover,
    .secondary-action:hover,
    .danger-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--shadow);
    }

    .primary-action:disabled,
    .secondary-action:disabled,
    .danger-action:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 8px 0 18px;
    }

    .stat-card {
      min-height: 112px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
    }

    .stat-label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat-value {
      margin: 0;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
    }

    .stat-unit {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .progress-card {
      grid-row: span 2;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .progress-ring {
      display: grid;
      place-items: center;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: conic-gradient(var(--primary) calc(var(--progress) * 1%), var(--border) 0);
      transition: background 0.5s ease;
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .progress-ring-inner {
      display: grid;
      place-items: center;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--card);
    }

    .progress-ring strong {
      display: block;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }

    .progress-ring span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .week-panel,
    .weakness-panel,
    .settings-panel,
    .complete-panel {
      margin-top: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 900;
    }

    .weakness-list {
      display: grid;
      gap: 8px;
    }

    .weakness-item,
    .mistake-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
      text-align: left;
    }

    .weakness-word,
    .mistake-word {
      min-width: 0;
    }

    .weakness-word strong,
    .mistake-word strong {
      display: block;
      font-family: "Noto Sans JP", sans-serif;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .weakness-word span,
    .mistake-word span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .weakness-badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 9px;
      border: 1px solid color-mix(in srgb, var(--danger), var(--border) 40%);
      border-radius: 999px;
      background: var(--danger-soft);
      color: var(--danger);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .weakness-empty {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.6;
    }

    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
    }

    .day-pill {
      display: grid;
      place-items: center;
      min-height: 54px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .day-pill.active {
      border-color: color-mix(in srgb, var(--success), var(--border) 35%);
      background: var(--success-soft);
      color: var(--success);
    }

    .day-pill.today {
      box-shadow: inset 0 -3px 0 var(--primary);
    }

    .day-pill span {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      font-weight: 700;
    }

    .study-view {
      display: grid;
      min-height: calc(100vh - 108px - env(safe-area-inset-top));
      min-height: calc(100dvh - 108px - env(safe-area-inset-top));
      grid-template-rows: auto 1fr auto;
      gap: 16px;
    }

    .study-status {
      display: grid;
      gap: 10px;
    }

    .study-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .flow-metrics {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .flow-metrics::-webkit-scrollbar {
      display: none;
    }

    .metric-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .metric-pill.hot {
      border-color: color-mix(in srgb, var(--success), var(--border) 34%);
      background: var(--success-soft);
      color: var(--success);
    }

    .metric-pill.rescue {
      border-color: color-mix(in srgb, var(--warning), var(--border) 34%);
      background: var(--warning-soft);
      color: var(--warning);
    }

    .progress-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--border);
    }

    .progress-fill {
      width: var(--width);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--success));
      transition: width 0.5s ease;
    }

    .card-stage {
      display: grid;
      place-items: center;
      position: relative;
      min-height: 560px;
      perspective: 1200px;
    }

    .study-card {
      grid-area: 1 / 1;
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      min-height: 520px;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: 0 24px 60px var(--shadow);
      transform: translateY(0) rotate(0);
      transition: transform 0.4s var(--ease-out), opacity 0.4s var(--ease-out), border-color 0.18s ease;
      will-change: transform, opacity;
      touch-action: pan-y;
    }

    .stack-preview {
      grid-area: 1 / 1;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      min-height: 520px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
      opacity: 0.58;
      pointer-events: none;
      transform: translateY(18px) scale(0.96);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }

    .stack-preview::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, color-mix(in srgb, var(--bg), transparent 8%) 78%, var(--bg) 100%);
    }

    .stack-preview-inner {
      display: grid;
      min-height: 470px;
      align-content: end;
      justify-items: center;
      gap: 8px;
      color: var(--muted);
      text-align: center;
    }

    .stack-preview-label {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      font-size: 12px;
      font-weight: 900;
    }

    .stack-preview-word {
      margin: 0;
      color: color-mix(in srgb, var(--text), var(--muted) 42%);
      font-family: "Noto Sans JP", sans-serif;
      font-size: 34px;
      font-weight: 900;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .study-card.entering {
      transform: translateY(100vh);
    }

    .study-card.exiting-up {
      opacity: 0;
      transform: translateY(-120vh) rotate(-5deg);
    }

    .study-card:hover {
      border-color: color-mix(in srgb, var(--primary), var(--border) 58%);
    }

    .study-card.result-correct {
      border-color: color-mix(in srgb, var(--success), var(--border) 18%);
      box-shadow: 0 24px 70px color-mix(in srgb, var(--success), transparent 78%);
      animation: correctPulse 0.46s var(--ease-out);
    }

    .study-card.result-wrong {
      border-color: color-mix(in srgb, var(--danger), var(--border) 18%);
      box-shadow: 0 24px 70px color-mix(in srgb, var(--danger), transparent 80%);
      animation: wrongShake 0.34s ease;
    }

    .study-card.result-hesitant {
      border-color: color-mix(in srgb, var(--warning), var(--border) 22%);
      box-shadow: 0 24px 70px color-mix(in srgb, var(--warning), transparent 84%);
    }

    @keyframes correctPulse {
      0% { transform: scale(1); }
      45% { transform: scale(1.018); }
      100% { transform: scale(1); }
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      50% { transform: translateX(7px); }
      75% { transform: translateX(-4px); }
    }

    .card-front {
      display: grid;
      min-height: 268px;
      align-content: center;
      justify-items: center;
      gap: 12px;
      text-align: center;
      user-select: none;
    }

    .type-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .type-tag,
    .tag-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid color-mix(in srgb, var(--primary), var(--border) 48%);
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 900;
    }

    .word-kanji {
      margin: 8px 0 0;
      color: var(--text);
      font-family: "Noto Sans JP", sans-serif;
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .word-kanji.compact {
      font-size: 60px;
    }

    .word-reading {
      margin: 0;
      color: var(--muted);
      font-family: "Noto Sans JP", sans-serif;
      font-size: 22px;
      font-weight: 300;
      line-height: 1.25;
    }

    .quiz-mode {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card-strong);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .meaning-prompt {
      margin: 8px 0 0;
      color: var(--success);
      font-size: 42px;
      font-weight: 900;
      line-height: 1.08;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .speak-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--card-strong);
      color: var(--text);
      font-size: 20px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .speak-button:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: 0 12px 26px var(--shadow);
    }

    .reveal-panel {
      max-height: 0;
      margin-top: 0;
      opacity: 0;
      overflow: hidden;
      border-top: 1px solid transparent;
      transition: max-height 0.38s var(--ease-out), opacity 0.28s ease, border-color 0.25s ease, margin-top 0.25s ease;
    }

    .study-card.revealed .reveal-panel,
    .reveal-panel.revealed {
      max-height: 640px;
      margin-top: 14px;
      border-top-color: var(--border);
      opacity: 1;
    }

    .meaning-cn {
      margin: 18px 0 14px;
      color: var(--success);
      font-size: 28px;
      font-weight: 700;
      line-height: 1.18;
      text-align: center;
    }

    .example-box {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
    }

    .example-ja {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.8;
    }

    rt {
      color: var(--muted);
      font-size: 0.58em;
      font-weight: 500;
    }

    .example-cn {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.6;
    }

    .answer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .quiz-options {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .quiz-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
      color: var(--text);
      text-align: left;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .quiz-option:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: 0 12px 26px var(--shadow);
    }

    .quiz-option:disabled {
      cursor: default;
    }

    .quiz-option.correct {
      border-color: color-mix(in srgb, var(--success), var(--border) 25%);
      background: var(--success-soft);
    }

    .quiz-option.wrong {
      border-color: color-mix(in srgb, var(--danger), var(--border) 25%);
      background: var(--danger-soft);
    }

    .quiz-option.dimmed {
      opacity: 0.62;
    }

    .option-index {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--bg);
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .option-text {
      min-width: 0;
    }

    .option-label {
      display: block;
      font-family: "Noto Sans JP", "Noto Sans TC", sans-serif;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .option-sub {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .hesitant-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      border: 1px dashed color-mix(in srgb, var(--warning), var(--border) 35%);
      border-radius: var(--radius);
      background: var(--warning-soft);
      color: var(--warning);
      font-weight: 900;
    }

    .result-callout {
      display: grid;
      gap: 4px;
      margin: 16px 0 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
      text-align: center;
    }

    .result-callout.correct {
      border-color: color-mix(in srgb, var(--success), var(--border) 30%);
      background: var(--success-soft);
    }

    .result-callout.wrong {
      border-color: color-mix(in srgb, var(--danger), var(--border) 30%);
      background: var(--danger-soft);
    }

    .result-callout.hesitant {
      border-color: color-mix(in srgb, var(--warning), var(--border) 30%);
      background: var(--warning-soft);
    }

    .result-title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.35;
    }

    .result-detail {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .remember-button,
    .unsure-button {
      min-height: 52px;
      border-radius: var(--radius);
      font-weight: 900;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .remember-button {
      background: var(--success);
      color: #07150c;
      box-shadow: 0 12px 28px rgba(34, 197, 94, 0.18);
    }

    .unsure-button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }

    .remember-button:hover,
    .unsure-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px var(--shadow);
    }

    .study-hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.6;
      text-align: center;
    }

    .settings-view {
      display: grid;
      gap: 14px;
    }

    .settings-panel {
      display: grid;
      gap: 18px;
    }

    .setting-group {
      display: grid;
      gap: 10px;
    }

    .setting-label {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .segmented,
    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .segment-button,
    .filter-button {
      min-width: 44px;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .segment-button.active,
    .filter-button.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary);
    }

    .segment-button:hover,
    .filter-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px var(--shadow);
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
    }

    .switch {
      position: relative;
      width: 68px;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card-strong);
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--text);
      transition: transform 0.22s var(--ease-out), background 0.18s ease;
    }

    .switch.active {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .switch.active::after {
      transform: translateX(26px);
      background: var(--primary);
    }

    .settings-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.6;
    }

    .complete-view {
      display: grid;
      min-height: calc(100vh - 108px - env(safe-area-inset-top));
      min-height: calc(100dvh - 108px - env(safe-area-inset-top));
      align-content: center;
      gap: 16px;
    }

    .complete-panel {
      display: grid;
      gap: 18px;
      text-align: center;
    }

    .complete-title {
      margin: 0;
      font-size: 34px;
      font-weight: 900;
      line-height: 1.1;
    }

    .complete-copy {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.6;
    }

    .complete-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .complete-stat.accuracy-stat {
      grid-column: 1 / -1;
    }

    .complete-stat {
      min-height: 88px;
      padding: 12px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
    }

    .complete-stat strong {
      display: block;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }

    .complete-stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .mistake-list {
      display: grid;
      gap: 8px;
    }

    .mistake-heading {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-align: left;
    }

    .empty-state {
      display: grid;
      gap: 14px;
      padding: 28px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      text-align: center;
    }

    .empty-state h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
    }

    .empty-state p {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      z-index: 80;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      max-width: min(420px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      box-shadow: 0 16px 36px var(--shadow);
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 18px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .feedback-burst,
    .milestone-overlay {
      position: fixed;
      z-index: 70;
      left: 50%;
      pointer-events: none;
      transform: translateX(-50%);
    }

    .feedback-burst {
      top: calc(84px + env(safe-area-inset-top));
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--text);
      box-shadow: 0 16px 36px var(--shadow);
      font-size: 14px;
      font-weight: 900;
      animation: burstIn 0.6s var(--ease-out) both;
    }

    .feedback-burst.correct {
      border-color: color-mix(in srgb, var(--success), var(--border) 30%);
      background: var(--success-soft);
      color: var(--success);
    }

    .feedback-burst.wrong {
      border-color: color-mix(in srgb, var(--danger), var(--border) 30%);
      background: var(--danger-soft);
      color: var(--danger);
    }

    .feedback-burst.hesitant {
      border-color: color-mix(in srgb, var(--warning), var(--border) 30%);
      background: var(--warning-soft);
      color: var(--warning);
    }

    .milestone-overlay {
      bottom: calc(70px + env(safe-area-inset-bottom));
      width: min(420px, calc(100vw - 28px));
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--primary), var(--border) 38%);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--card), var(--bg) 10%);
      box-shadow: 0 20px 44px var(--shadow);
      animation: milestoneIn 0.45s var(--ease-out) both;
    }

    .milestone-title {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.3;
    }

    .milestone-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .milestone-grid span {
      display: block;
      min-height: 48px;
      padding: 8px 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-strong);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }

    .milestone-grid strong {
      display: block;
      margin-bottom: 3px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }

    @keyframes burstIn {
      0% {
        opacity: 0;
        transform: translate(-50%, -10px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, 0) scale(1);
      }
    }

    @keyframes milestoneIn {
      0% {
        opacity: 0;
        transform: translate(-50%, 18px);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @media (max-width: 360px) {
      .app-main {
        padding-left: 12px;
        padding-right: 12px;
      }

      .home-title {
        font-size: 38px;
      }

      .word-kanji {
        font-size: 64px;
      }

      .word-kanji.compact {
        font-size: 54px;
      }

      .meaning-prompt {
        font-size: 34px;
      }

      .study-card {
        padding: 18px;
      }

      .stack-preview {
        padding: 16px;
      }

      .flow-metrics {
        padding-bottom: 2px;
      }

      .milestone-grid {
        grid-template-columns: 1fr;
      }

      .complete-stats {
        grid-template-columns: 1fr;
      }

      .complete-stat.accuracy-stat {
        grid-column: auto;
      }

      .weakness-item,
      .mistake-item {
        grid-template-columns: 1fr;
      }

      .weakness-badge {
        width: max-content;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

  <script>

      const DateUtil = {
        todayKey(date = new Date()) {
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, "0");
          const day = String(date.getDate()).padStart(2, "0");
          return `${year}-${month}-${day}`;
        },
        fromKey(key) {
          const [year, month, day] = key.split("-").map(Number);
          return new Date(year, month - 1, day);
        },
        addDays(key, days) {
          const date = this.fromKey(key);
          date.setDate(date.getDate() + days);
          return this.todayKey(date);
        },
        daysBetween(startKey, endKey) {
          const start = this.fromKey(startKey);
          const end = this.fromKey(endKey);
          const dayMs = 24 * 60 * 60 * 1000;
          return Math.round((end - start) / dayMs);
        },
        shortDayLabel(key) {
          const date = this.fromKey(key);
          return ["日", "一", "二", "三", "四", "五", "六"][date.getDay()];
        }
      };

      const Store = {
        defaultState() {
          return {
            settings: {
              theme: "dark",
              selectedTypes: [],
              rewardSound: true
            },
            progress: {},
            stats: {
              streak: 0,
              lastStudyDate: null,
              totalStudied: 0,
              daily: {}
            }
          };
        },
        defaultProgress() {
          return {
            ease: 2.5,
            interval: 0,
            repetition: 0,
            due: DateUtil.todayKey(),
            seen: false,
            learned: false,
            studiedCount: 0,
            rememberedCount: 0,
            correctCount: 0,
            wrongCount: 0,
            hesitantCount: 0,
            lastResult: null,
            lastStudied: null
          };
        },
        load() {
          let state = this.defaultState();
          try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
              state = this.mergeState(state, JSON.parse(stored));
            }
          } catch (error) {
            console.warn("Unable to load saved progress.", error);
          }
          this.ensureProgress(state);
          this.normalizeStreak(state);
          this.save(state);
          return state;
        },
        mergeState(base, stored) {
          return {
            settings: { ...base.settings, ...(stored.settings || {}) },
            progress: { ...(stored.progress || {}) },
            stats: { ...base.stats, ...(stored.stats || {}), daily: { ...((stored.stats && stored.stats.daily) || {}) } }
          };
        },
        ensureProgress(state) {
          Vocabulary.forEach((word) => {
            state.progress[word.id] = this.normalizeProgress(state.progress[word.id]);
          });
        },
        normalizeProgress(progress = {}) {
          const defaults = this.defaultProgress();
          const merged = {
            ...defaults,
            ...progress
          };
          const toNumber = (value, fallback) => {
            const number = Number(value);
            return Number.isFinite(number) ? number : fallback;
          };
          merged.ease = Math.max(1.3, toNumber(merged.ease, defaults.ease));
          merged.interval = Math.max(0, Math.round(toNumber(merged.interval, defaults.interval)));
          merged.repetition = Math.max(0, Math.round(toNumber(merged.repetition, defaults.repetition)));
          merged.studiedCount = Math.max(0, Math.round(toNumber(merged.studiedCount, defaults.studiedCount)));
          merged.rememberedCount = Math.max(0, Math.round(toNumber(merged.rememberedCount, defaults.rememberedCount)));
          merged.correctCount = "correctCount" in progress
            ? Math.max(0, Math.round(toNumber(progress.correctCount, defaults.correctCount)))
            : merged.rememberedCount;
          merged.wrongCount = Math.max(0, Math.round(toNumber(merged.wrongCount, defaults.wrongCount)));
          merged.hesitantCount = Math.max(0, Math.round(toNumber(merged.hesitantCount, defaults.hesitantCount)));
          merged.lastResult = ["correct", "hesitant", "wrong"].includes(merged.lastResult) ? merged.lastResult : null;
          merged.due = typeof merged.due === "string" ? merged.due : DateUtil.todayKey();
          merged.lastStudied = typeof merged.lastStudied === "string" ? merged.lastStudied : null;
          merged.seen = Boolean(merged.seen);
          merged.learned = Boolean(merged.learned);
          return merged;
        },
        normalizeStreak(state) {
          const { lastStudyDate } = state.stats;
          if (!lastStudyDate) return;
          const gap = DateUtil.daysBetween(lastStudyDate, DateUtil.todayKey());
          if (gap > 1) {
            state.stats.streak = 0;
          }
        },
        save(state) {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          } catch (error) {
            console.warn("Unable to save progress.", error);
          }
        },
        reset() {
          const state = this.defaultState();
          this.ensureProgress(state);
          this.save(state);
          return state;
        }
      };

      const SRS = {
        update(progress, result) {
          const today = DateUtil.todayKey();
          const normalizedResult = typeof result === "boolean"
            ? (result ? "correct" : "hesitant")
            : result;
          progress.lastResult = ["correct", "hesitant", "wrong"].includes(normalizedResult)
            ? normalizedResult
            : "hesitant";

          if (progress.lastResult === "wrong") {
            progress.wrongCount += 1;
            progress.ease = Math.max(1.3, Number((progress.ease - 0.22).toFixed(2)));
            progress.interval = 1;
            progress.repetition = 0;
            progress.learned = false;
            progress.due = DateUtil.addDays(today, 1);
            return progress;
          }

          if (progress.lastResult === "hesitant") {
            progress.hesitantCount += 1;
            progress.ease = Math.max(1.3, Number((progress.ease - 0.06).toFixed(2)));
            progress.interval = Math.max(1, Math.min(progress.interval || 1, 2));
            progress.due = DateUtil.addDays(today, progress.interval);
            return progress;
          }

          const previousRep = progress.repetition;
          progress.repetition += 1;
          progress.ease = Math.max(1.3, Number((progress.ease + 0.08).toFixed(2)));

          if (previousRep === 0) {
            progress.interval = 1;
          } else if (previousRep === 1) {
            progress.interval = 3;
          } else if (previousRep === 2) {
            progress.interval = 7;
          } else if (previousRep === 3) {
            progress.interval = 14;
          } else {
            progress.interval = Math.max(progress.interval + 1, Math.round(progress.interval * progress.ease));
          }

          progress.correctCount += 1;
          progress.rememberedCount += 1;
          progress.learned = true;
          progress.due = DateUtil.addDays(today, progress.interval);
          return progress;
        }
      };

            return;
          }

          const action = actionTarget.dataset.action;
          const value = actionTarget.dataset.value;

          if (action === "go-home") this.renderHome();
          if (action === "open-settings") this.renderSettings();
          if (action === "toggle-theme") this.toggleTheme();
          if (action === "toggle-reward-sound") this.toggleRewardSound();
          if (action === "start-session") this.startSession();
          if (action === "practice-mistakes") this.startMistakeSession();
          if (action === "speak") this.speakCurrent(event);
          if (action === "select-option") this.selectOption(Number(value));
          if (action === "mark-hesitant") this.markHesitant();
          if (action === "next-question") this.nextQuestion();
          if (action === "remember") this.answerCurrent("correct");
          if (action === "unsure") this.answerCurrent("hesitant");
          if (action === "toggle-filter") this.toggleFilter(value);
          if (action === "reset-progress") this.resetProgress();
        },

        handleKeydown(event) {
          if (this.view === "complete" && event.key === " ") {
            event.preventDefault();
            this.startSession();
            return;
          }

          if (this.view !== "study") return;
          const number = Number(event.key);
          if (number >= 1 && number <= 4) {
            event.preventDefault();
            this.selectOption(number - 1);
            return;
          }
          if (event.key === " ") {
            event.preventDefault();
            if (this.getCurrentAnswer()) {
              this.nextQuestion();
            } else {
              this.revealCard();
            }
            return;
          }
          if (event.key === "Enter") {
            event.preventDefault();
            if (this.getCurrentAnswer()) this.nextQuestion();
            return;
          }
          if (["ArrowUp", "ArrowLeft", "ArrowRight"].includes(event.key)) {
            event.preventDefault();
            this.skipCurrent();
          }
        },

        handleTouchStart(event) {
          if (this.view !== "study") return;
          const card = event.target.closest(".study-card");
          if (!card) return;
          this.touch.active = true;
          this.touch.startX = event.touches[0].clientX;
          this.touch.startY = event.touches[0].clientY;
          this.touch.lastX = this.touch.startX;
          this.touch.lastY = this.touch.startY;
        },

        handleTouchMove(event) {
          if (!this.touch.active) return;
          this.touch.lastX = event.touches[0].clientX;
          this.touch.lastY = event.touches[0].clientY;
        },

        handleTouchEnd() {
          if (!this.touch.active) return;
          const deltaX = this.touch.lastX - this.touch.startX;
          const deltaY = this.touch.startY - this.touch.lastY;
          const horizontalSwipe = Math.abs(deltaX) > 72 && Math.abs(deltaX) >= Math.abs(deltaY);
          const upwardSwipe = deltaY > 72 && deltaY > Math.abs(deltaX);
          this.touch.active = false;
          if (horizontalSwipe || upwardSwipe) {
            this.skipCurrent();
          }
        },

        renderWeaknessPanel() {

          return `

              <h2 class="section-title">弱點快掃 <span class="stat-unit">錯題優先</span></h2>

                <div class="weakness-list">

        renderMistakeSummary(session) {
          if (!session.wrongWordIds || !session.wrongWordIds.length) return "";
          const words = session.wrongWordIds
            .map((id) => Vocabulary.find((word) => word.id === id))
            .filter(Boolean);
          if (!words.length) return "";

          return `
            <div class="mistake-list" aria-label="本次錯題摘要">

              ${words.map((word) => `
                <div class="mistake-item">

        createEmptySession(mode = "daily") {
          return {
            mode,
            queue: [],
            target: 0,
            answered: 0,
            correct: 0,
            wrong: 0,
            hesitant: 0,
            newWords: 0,
            newWordIds: [],
            wrongWordIds: [],
            retryCounts: {},
            currentStreak: 0,
            bestStreak: 0,
            rescuedCount: 0,
            milestoneBase: { answered: 0, correct: 0, wrong: 0, hesitant: 0, rescued: 0 },
            milestoneSummary: null,
            feedback: null,
            currentQuestion: null,
            currentAnswer: null
          };
        },

        startSession() {
          const candidates = this.getFilteredWords();
          const queue = this.buildPersonalizedQueue(candidates, FLOW_QUEUE_TARGET);

          if (!queue.length) {
            this.renderEmptySession();
            return;
          }

          this.session = {
            ...this.createEmptySession("daily"),
            queue: this.createQuestionQueue(queue),
            target: queue.length
          };
          this.revealed = false;
          this.resetAutoSpeak();
          this.clearMilestone();
          this.renderStudy();
        },

        startMistakeSession() {
          const ids = this.session && this.session.wrongWordIds && this.session.wrongWordIds.length
            ? this.session.wrongWordIds
            : (this.lastMistakeIds || []);
          const uniqueIds = Array.from(new Set(ids));
          const words = uniqueIds
            .map((id) => Vocabulary.find((word) => word.id === id))
            .filter(Boolean);

          if (!words.length) {
            this.showToast("這次沒有錯題可以再練。");
            return;
          }

          const queue = this.shuffle(words);
          this.session = {
            ...this.createEmptySession("mistakes"),
            queue: this.createQuestionQueue(queue),
            target: queue.length
          };
          this.revealed = false;
          this.resetAutoSpeak();
          this.clearMilestone();
          this.renderStudy();
        },

        createQuestionQueue(words) {
          const offset = Math.floor(Math.random() * QUIZ_MODES.length);
          return words.map((word, index) => ({
            id: word.id,
            mode: QUIZ_MODES[(index + offset) % QUIZ_MODES.length],
            retry: false
          }));
        },

        buildPersonalizedQueue(candidates, size, excludeIds = []) {
          const excluded = new Set(excludeIds);
          let pool = candidates.filter((word) => !excluded.has(word.id));
          if (!pool.length) pool = candidates.slice();

          const bins = {
            weak: [],
            due: [],
            new: [],
            review: []
          };

          pool.forEach((word) => {
            const progress = this.state.progress[word.id];
            const entry = { word, score: this.getFlowScore(word, progress) };
            const isWeak = progress.seen && (
              progress.lastResult === "wrong" ||
              progress.lastResult === "hesitant" ||
              progress.wrongCount > progress.correctCount ||
              progress.ease < 2.25
            );

            if (isWeak) {
              bins.weak.push(entry);
            } else if (!progress.seen) {
              bins.new.push(entry);
            } else if (this.isDue(word)) {
              bins.due.push(entry);
            } else {
              bins.review.push(entry);
            }
          });

          Object.values(bins).forEach((bin) => bin.sort((a, b) => b.score - a.score));

          const pattern = ["weak", "new", "due", "review", "weak", "new", "review", "due"];
          const selected = [];
          const selectedIds = new Set();
          let patternIndex = 0;

          while (selected.length < size && Object.values(bins).some((bin) => bin.length)) {
            const key = pattern[patternIndex % pattern.length];
            patternIndex += 1;
            let entry = bins[key].shift();
            if (!entry) {
              entry = this.takeHighestFlowEntry(bins);
            }
            if (!entry || selectedIds.has(entry.word.id)) continue;
            selectedIds.add(entry.word.id);
            selected.push(entry.word);
          }

          return selected;
        },

        takeHighestFlowEntry(bins) {
          let bestKey = null;
          Object.keys(bins).forEach((key) => {
            if (!bins[key].length) return;
            if (!bestKey || bins[key][0].score > bins[bestKey][0].score) {
              bestKey = key;
            }
          });
          return bestKey ? bins[bestKey].shift() : null;
        },

        getFlowScore(word, progress) {
          const dueBoost = this.isDue(word) ? 8 : 0;
          const newBoost = progress.seen ? 0 : 6;
          const weakBoost = progress.wrongCount * 3 + progress.hesitantCount * 1.4;
          const recentWrongBoost = progress.lastResult === "wrong" ? 5 : progress.lastResult === "hesitant" ? 2 : 0;
          const easeBoost = Math.max(0, 2.5 - progress.ease) * 2;
          return dueBoost + newBoost + weakBoost + recentWrongBoost + easeBoost + Math.random() * 4;
        },

        ensureFlowQueue(minSize = FLOW_QUEUE_TARGET) {
          if (!this.session || this.session.mode !== "daily") return;
          if (this.session.queue.length >= minSize) return;
          const candidates = this.getFilteredWords();
          const queuedIds = this.session.queue.map((item) => typeof item === "string" ? item : item.id);
          const needed = minSize - this.session.queue.length;
          const nextWords = this.buildPersonalizedQueue(candidates, needed, queuedIds);
          this.session.queue.push(...this.createQuestionQueue(nextWords));
        },

        scheduleWrongRetry(item) {
          const count = this.session.retryCounts[item.id] || 0;
          if (count >= WRONG_RETRY_LIMIT) return;

          this.session.retryCounts[item.id] = count + 1;
          const retryItem = {
            id: item.id,
            mode: this.getOppositeMode(item.mode),
            retry: true
          };
          const insertIndex = Math.min(
            this.session.queue.length,
            Math.max(2, Math.min(4, this.session.queue.length))
          );
          this.session.queue.splice(insertIndex, 0, retryItem);
          this.session.target += 1;
        },

        revealCard() {
          if (this.view !== "study" || this.animating) return;
          this.markHesitant();
        },

        expandRevealPanel(panel) {
          panel.classList.add("revealed");
          panel.style.setProperty("max-height", "640px", "important");
          panel.style.setProperty("opacity", "1", "important");
          panel.style.setProperty("margin-top", "14px", "important");
          panel.style.setProperty("border-top-color", "var(--border)", "important");
        },

        selectOption(index) {
          if (this.view !== "study" || this.animating) return;
          if (this.getCurrentAnswer()) return;
          const question = this.getCurrentQuestion();
          const option = question.options[index];
          if (!option) return;
          this.answerCurrent(option.isCorrect ? "correct" : "wrong", option, index);
        },

        markHesitant() {
          if (this.view !== "study" || this.animating) return;
          if (this.getCurrentAnswer()) return;
          this.answerCurrent("hesitant", null, null);
        },

        answerCurrent(result, selectedOption = null, selectedIndex = null) {
          if (this.view !== "study" || this.animating) return;
          if (this.getCurrentAnswer()) return;
          const item = this.getCurrentItem();
          const word = this.getCurrentWord();
          if (!item || !word) return;

          const progress = this.state.progress[word.id];
          const wasNew = !progress.seen;
          progress.seen = true;
          progress.studiedCount += 1;
          progress.lastStudied = DateUtil.todayKey();
          SRS.update(progress, result);

          this.recordStudy();
          if (wasNew && !this.session.newWordIds.includes(word.id)) {
            this.session.newWordIds.push(word.id);
            this.session.newWords += 1;
          }
          this.session[result] += 1;
          this.session.answered += 1;
          if (result === "correct") {
            this.session.currentStreak += 1;
            this.session.bestStreak = Math.max(this.session.bestStreak, this.session.currentStreak);
          } else {
            this.session.currentStreak = 0;
          }
          if (item.retry && result === "correct") {
            this.session.rescuedCount += 1;
          }
          this.session.feedback = this.createFeedback(result);
          this.session.currentAnswer = {
            id: word.id,
            result,
            selectedIndex,
            selectedOptionId: selectedOption ? selectedOption.id : null
          };

          if (result === "wrong") {
            if (!this.session.wrongWordIds.includes(word.id)) {
              this.session.wrongWordIds.push(word.id);
            }
            this.scheduleWrongRetry(item);
          }

          Store.save(this.state);
          this.maybeShowMilestone();
          this.playAnswerFeedback(result);
          this.revealed = true;
          this.renderStudy({ animate: false });
        },

        createFeedback(result) {
          if (result === "correct") {
            const streak = this.session.currentStreak;
            return {
              result,
              text: streak >= 5 ? `連續 ${streak} 題` : "答對了"
            };
          }
          if (result === "wrong") {
            return { result, text: "答案回流" };
          }
          return { result, text: "先看一次" };
        },

        maybeShowMilestone() {
          if (!this.session || this.session.mode !== "daily") return;
          if (this.session.answered === 0 || this.session.answered % FLOW_BATCH_SIZE !== 0) return;

          const base = this.session.milestoneBase;
          const answered = this.session.answered - base.answered;
          const correct = this.session.correct - base.correct;
          const rescued = this.session.rescuedCount - base.rescued;
          this.session.milestoneSummary = {
            answered,
            accuracy: answered ? Math.round((correct / answered) * 100) : 0,
            bestStreak: this.session.bestStreak,
            rescued
          };
          this.session.milestoneBase = {
            answered: this.session.answered,
            correct: this.session.correct,
            wrong: this.session.wrong,
            hesitant: this.session.hesitant,
            rescued: this.session.rescuedCount
          };
          window.clearTimeout(this.milestoneTimer);
          this.milestoneTimer = window.setTimeout(() => {
            if (!this.session) return;
            this.session.milestoneSummary = null;
            if (this.view === "study") this.renderStudy({ animate: false });
          }, MILESTONE_VISIBLE_MS);
        },

        clearMilestone() {
          window.clearTimeout(this.milestoneTimer);
          this.milestoneTimer = null;
          if (this.session) this.session.milestoneSummary = null;
        },

        playAnswerFeedback(result, { force = false } = {}) {
          if ("vibrate" in navigator) {
            navigator.vibrate(result === "wrong" ? [24, 34, 24] : result === "correct" ? 18 : 10);
          }
          if (!force && !this.isRewardSoundEnabled()) {
            this.feedbackSoundUntil = 0;
            return 0;
          }

          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return 0;

          try {
            if (!this.feedbackAudio) this.feedbackAudio = new AudioContext();
            const context = this.feedbackAudio;
            if (context.state === "suspended") {
              const resume = context.resume();
              if (resume && typeof resume.catch === "function") resume.catch(() => {});
            }
            const now = context.currentTime;
            const notes = this.getFeedbackSoundNotes(this.getFeedbackSoundVariant(result));
            const master = context.createGain();
            const duration = Math.max(...notes.map((note) => note.start + note.duration)) + 0.08;

            master.gain.setValueAtTime(0.82, now);
            master.connect(context.destination);
            notes.forEach((note) => this.playFeedbackTone(context, master, now, note));
            window.setTimeout(() => master.disconnect(), Math.round(duration * 1000) + 120);
            this.feedbackSoundUntil = Date.now() + Math.round(duration * 1000);
            return Math.round(duration * 1000);
          } catch (error) {
            this.feedbackSoundUntil = 0;
            return 0;
          }
        },

        getFeedbackSoundVariant(result) {
          const item = this.getCurrentItem();
          const streak = this.session ? this.session.currentStreak : 0;
          if (result === "correct" && item && item.retry) return "rescue";
          if (result === "correct" && streak >= 5 && streak % 5 === 0) return "streak";
          return result;
        },

        getFeedbackSoundNotes(variant) {
          const sounds = {
            correct: [
              { frequency: 659.25, start: 0, duration: 0.09, volume: 0.05, type: "triangle" },
              { frequency: 880, start: 0.065, duration: 0.12, volume: 0.045, type: "triangle" },
              { frequency: 1174.66, start: 0.16, duration: 0.16, volume: 0.032, type: "sine" }
            ],
            streak: [
              { frequency: 523.25, start: 0, duration: 0.08, volume: 0.048, type: "triangle" },
              { frequency: 659.25, start: 0.055, duration: 0.09, volume: 0.052, type: "triangle" },
              { frequency: 783.99, start: 0.11, duration: 0.1, volume: 0.052, type: "triangle" },
              { frequency: 1046.5, start: 0.18, duration: 0.15, volume: 0.04, type: "sine" },
              { frequency: 1318.51, start: 0.28, duration: 0.14, volume: 0.028, type: "sine" }
            ],
            rescue: [
              { frequency: 587.33, start: 0, duration: 0.1, volume: 0.044, type: "triangle" },
              { frequency: 783.99, start: 0.08, duration: 0.12, volume: 0.047, type: "triangle" },
              { frequency: 987.77, start: 0.17, duration: 0.17, volume: 0.034, type: "sine" }
            ],
            hesitant: [
              { frequency: 392, start: 0, duration: 0.08, volume: 0.032, type: "sine" },
              { frequency: 493.88, start: 0.085, duration: 0.1, volume: 0.026, type: "sine" }
            ],
            wrong: [
              { frequency: 220, slideTo: 185, start: 0, duration: 0.12, volume: 0.04, type: "triangle", filter: 620 },
              { frequency: 164.81, slideTo: 146.83, start: 0.075, duration: 0.16, volume: 0.034, type: "sine", filter: 520 }
            ]
          };
          return sounds[variant] || sounds.hesitant;
        },

        playFeedbackTone(context, output, now, note) {
          const start = now + note.start;
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          let source = oscillator;

          oscillator.type = note.type || "sine";
          oscillator.frequency.setValueAtTime(note.frequency, start);
          if (note.slideTo) {
            oscillator.frequency.exponentialRampToValueAtTime(note.slideTo, start + note.duration);
          }

          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(note.volume || 0.035, start + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + note.duration);

          if (note.filter) {
            const filter = context.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.setValueAtTime(note.filter, start);
            oscillator.connect(filter);
            source = filter;
          }

          source.connect(gain);
          gain.connect(output);
          oscillator.start(start);
          oscillator.stop(start + note.duration + 0.04);
        },

        nextQuestion() {
          if (this.view !== "study" || this.animating || !this.session) return;
          if (!this.getCurrentAnswer()) {
            this.showToast("先選一個答案，或按空白鍵標記不熟。");
            return;
          }
          this.exitCard(() => {
            this.session.queue.shift();
            this.session.currentQuestion = null;
            this.session.currentAnswer = null;
            this.session.feedback = null;
            this.revealed = false;
            this.resetAutoSpeak();
            if (this.session.mode === "daily") {
              this.ensureFlowQueue();
              this.renderStudy();
            } else if (this.session.queue.length) {
              this.renderStudy();
            } else {
              this.renderComplete();
            }
          });
        },

        skipCurrent() {
          if (this.view !== "study" || this.animating || !this.session) return;
          if (this.getCurrentAnswer()) {
            this.nextQuestion();
            return;
          }
          if (this.session.queue.length < 2) return;
          this.exitCard(() => {
            const skipped = this.session.queue.shift();
            this.session.queue.push(skipped);
            this.session.currentQuestion = null;
            this.session.currentAnswer = null;
            this.session.feedback = null;
            this.revealed = false;
            this.resetAutoSpeak();
            if (this.session.mode === "daily" && this.session.queue.length < FLOW_REFILL_THRESHOLD) {
              this.ensureFlowQueue();
            }
            this.renderStudy();
          });
        },

        exitCard(callback) {
          const card = this.root.querySelector(".study-card");
          if (!card) {
            callback();
            return;
          }
          this.animating = true;
          card.classList.add("exiting-up");
          window.setTimeout(() => {
            this.animating = false;
            callback();
          }, 410);
        },

        speakCurrent(event) {
          if (event) event.stopPropagation();
          this.clearAutoSpeakTimer();
          const word = this.getCurrentWord();
          this.speakWord(word, { notifyUnsupported: true });
        },

        scheduleAutoSpeak(word, phase) {
          if (!word) return;
          const item = this.getCurrentItem();
          const answer = this.getCurrentAnswer();
          const marker = [
            item ? item.id : word.id,
            item ? item.mode : "",
            item && item.retry ? "retry" : "main",
            phase,
            this.session ? this.session.answered : 0,
            answer ? answer.result : "pending"
          ].join(":");

          if (this.autoSpeakMarker === marker) return;
          this.autoSpeakMarker = marker;
          this.clearAutoSpeakTimer();
          const baseDelay = phase === "answer" ? 220 : 360;
          const soundDelay = phase === "answer" && this.feedbackSoundUntil
            ? Math.max(0, this.feedbackSoundUntil - Date.now() + 80)
            : 0;
          this.autoSpeakTimer = window.setTimeout(() => {
            const currentWord = this.getCurrentWord();
            const currentAnswer = this.getCurrentAnswer();
            if (this.view !== "study" || !currentWord || currentWord.id !== word.id) return;
            if (phase === "prompt" && currentAnswer) return;
            if (phase === "answer" && !currentAnswer) return;
            this.speakWord(word);
          }, Math.max(baseDelay, soundDelay));
        },

        clearAutoSpeakTimer() {
          window.clearTimeout(this.autoSpeakTimer);
          this.autoSpeakTimer = null;
        },

        resetAutoSpeak() {
          this.clearAutoSpeakTimer();
          this.autoSpeakMarker = null;
        },

        speakWord(word, { notifyUnsupported = false } = {}) {
          if (!word || !("speechSynthesis" in window)) {
            if (!notifyUnsupported) return false;
            this.showToast("這個瀏覽器不支援語音朗讀。");
            return false;
          }
          const utterance = new SpeechSynthesisUtterance(word.kanji);
          utterance.lang = "ja-JP";
          utterance.rate = 0.85;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(utterance);
          return true;
        },

        recordStudy() {
          const today = DateUtil.todayKey();
          const last = this.state.stats.lastStudyDate;
          if (last !== today) {
            this.state.stats.streak = last && DateUtil.daysBetween(last, today) === 1
              ? this.state.stats.streak + 1
              : 1;
            this.state.stats.lastStudyDate = today;
          }

          if (!this.state.stats.daily[today]) {
            this.state.stats.daily[today] = { count: 0 };
          }
          this.state.stats.daily[today].count += 1;
          this.state.stats.totalStudied += 1;
        },

        toggleFilter(value) {
          if (value === "all") {
            this.state.settings.selectedTypes = [];
          } else {
            const selected = new Set(this.state.settings.selectedTypes);
            if (selected.has(value)) {
              selected.delete(value);
            } else {
              selected.add(value);
            }
            this.state.settings.selectedTypes = Array.from(selected);
          }
          Store.save(this.state);
          this.renderSettings();
        },

        toggleTheme() {
          this.state.settings.theme = this.state.settings.theme === "dark" ? "light" : "dark";
          this.applyTheme();
          Store.save(this.state);
          if (this.view === "settings") this.renderSettings();
        },

        isRewardSoundEnabled() {
          return this.state.settings.rewardSound !== false;
        },

        toggleRewardSound() {
          this.state.settings.rewardSound = !this.isRewardSoundEnabled();
          Store.save(this.state);
          if (this.state.settings.rewardSound) {
            this.playAnswerFeedback("correct", { force: true });
            this.showToast("獎勵音效已開啟。");
          } else {
            this.feedbackSoundUntil = 0;
            this.showToast("獎勵音效已關閉。");
          }
          if (this.view === "settings") this.renderSettings();
        },

        applyTheme() {
          document.documentElement.dataset.theme = this.state.settings.theme;
          document.querySelector('meta[name="theme-color"]').setAttribute("content", this.state.settings.theme === "dark" ? "#09090b" : "#faf9f7");
          document.querySelector('[data-action="toggle-theme"]').textContent = this.state.settings.theme === "dark" ? "☾" : "☀";
        },

        resetProgress() {
          if (!this.resetArmed) {
            this.resetArmed = true;
            this.showToast("再按一次重置進度。");
            this.renderSettings();
            clearTimeout(this.resetTimer);
            this.resetTimer = window.setTimeout(() => {
              this.resetArmed = false;
              if (this.view === "settings") this.renderSettings();
            }, 3500);
            return;
          }

          clearTimeout(this.resetTimer);
          this.resetArmed = false;
          this.state = Store.reset();
          this.applyTheme();
          this.showToast("進度已重置。");
          this.renderSettings();
        },

        getFilteredWords() {
          const selected = this.state.settings.selectedTypes;
          if (!selected.length) return Vocabulary.slice();
          return Vocabulary.filter((word) => selected.includes(word.type));
        },

        getWeakWords(limit) {
          return Vocabulary.map((word) => {
            const progress = this.state.progress[word.id];
            const dueBoost = this.isDue(word) && progress.seen ? 2 : 0;
            const lowEaseBoost = Math.max(0, 2.5 - progress.ease);
            return {
              word,
              progress,
              score: progress.wrongCount * 3 + progress.hesitantCount * 1.5 + dueBoost + lowEaseBoost
            };
          })
            .filter(({ progress, score }) => progress.seen && score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, limit);
        },

        isDue(word) {
          return this.state.progress[word.id].due <= DateUtil.todayKey();
        },

        getCurrentItem() {
          if (!this.session || !this.session.queue.length) return null;
          const item = this.session.queue[0];
          if (typeof item === "string") {
            return { id: item, mode: QUIZ_MODES[0], retry: false };
          }
          return item;
        },

        getCurrentWord() {
          const item = this.getCurrentItem();
          if (!item) return null;
          return Vocabulary.find((word) => word.id === item.id);
        },

        getNextWord() {
          if (!this.session || this.session.queue.length < 2) return null;
          const item = this.session.queue[1];
          const id = typeof item === "string" ? item : item.id;
          return Vocabulary.find((word) => word.id === id);
        },

        getCurrentQuestion() {
          const item = this.getCurrentItem();
          const word = this.getCurrentWord();
          if (!item || !word) return null;
          if (
            this.session.currentQuestion &&
            this.session.currentQuestion.id === item.id &&
            this.session.currentQuestion.mode === item.mode
          ) {
            return this.session.currentQuestion;
          }
          this.session.currentQuestion = this.buildQuestion(word, item.mode);
          return this.session.currentQuestion;
        },

        getCurrentAnswer() {
          const item = this.getCurrentItem();
          if (!item || !this.session || !this.session.currentAnswer) return null;
          return this.session.currentAnswer.id === item.id ? this.session.currentAnswer : null;
        },

        buildQuestion(word, mode) {
          return {
            id: word.id,
            mode,
            options: this.buildOptions(word, mode)
          };
        },

        buildOptions(word, mode) {
          const labelFor = (item) => mode === "ja-to-cn" ? item.meaning : item.kanji;
          const subLabelFor = (item) => mode === "ja-to-cn" ? "" : item.reading;
          const usedLabels = new Set([labelFor(word)]);
          const distractors = [];

          this.getDistractorPool(word).forEach((candidate) => {
            const label = labelFor(candidate);
            if (distractors.length >= 3 || usedLabels.has(label)) return;
            usedLabels.add(label);
            distractors.push(candidate);
          });

          const optionWords = this.shuffle([word, ...distractors]).slice(0, 4);
          return optionWords.map((item) => ({
            id: item.id,
            label: labelFor(item),
            subLabel: subLabelFor(item),
            isCorrect: item.id === word.id
          }));
        },

        getDistractorPool(word) {
          const wordTags = new Set(word.tags);
          return Vocabulary.filter((candidate) => candidate.id !== word.id)
            .map((candidate) => {
              const tagOverlap = candidate.tags.filter((tag) => wordTags.has(tag)).length;
              const score = (candidate.type === word.type ? 8 : 0) + tagOverlap * 3 + Math.random();
              return { candidate, score };
            })
            .sort((a, b) => b.score - a.score)
            .map(({ candidate }) => candidate);
        },

        getOptionClass(option, index, answer) {
          if (!answer) return "";
          if (option.isCorrect) return "correct";
          if (answer.selectedIndex === index && answer.result === "wrong") return "wrong";
          return "dimmed";
        },

        getOppositeMode(mode) {
          return mode === "ja-to-cn" ? "cn-to-ja" : "ja-to-cn";
        },

        getDailyCount(key) {
          return (this.state.stats.daily[key] && this.state.stats.daily[key].count) || 0;
        },

        formatDisplayDate(key) {
          const [year, month, day] = key.split("-");
          return `${year}.${month}.${day}`;
        },

        shuffle(items) {
          const copy = items.slice();
          for (let index = copy.length - 1; index > 0; index -= 1) {
            const randomIndex = Math.floor(Math.random() * (index + 1));
            [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
          }
          return copy;
        },

        showToast(message) {
          this.toast.textContent = message;
          this.toast.classList.add("show");
          window.clearTimeout(this.toastTimer);
          this.toastTimer = window.setTimeout(() => this.toast.classList.remove("show"), 2100);
        }
      };

      window.addEventListener("DOMContentLoaded", () => App.init());
    })();
  </script>
</body>
